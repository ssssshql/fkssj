name: Build and Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package project
        run: |
          zip -r 水世界辅助.zip \
            main.js \
            project.json \
            modules/ \
            img/ \
            -x "*.git*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: 水世界辅助 v${{ github.run_number }}
          files: 水世界辅助.zip
